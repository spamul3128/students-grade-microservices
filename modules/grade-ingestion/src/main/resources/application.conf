# Application Configuration

server {
  host = "0.0.0.0"
  port = 8081
}

database {
  host = "localhost"
  host = ${?DB_HOST}
  port = 5432
  port = ${?DB_PORT}
  database = "grades_db"
  database = ${?DB_NAME}
  user = "postgres"
  user = ${?DB_USER}
  password = "postgres"
  password = ${?DB_PASSWORD}
  max-connections = 10
}

redis {
  host = "localhost"
  host = ${?REDIS_HOST}
  port = 6379
  port = ${?REDIS_PORT}
  password = null
  password = ${?REDIS_PASSWORD}
}

auth {
  jwt-secret = "change-this-secret-in-production"
  jwt-secret = ${?JWT_SECRET}
  token-expiration = "1 hour"
}

